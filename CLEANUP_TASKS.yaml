version: "1.0"
backlog_owner: "project_closure_auditor"
goal: "Stabilize project for closure by eliminating blockers before documentation hardening."

closure_sequence:
  - phase: "P0-runtime-unblock"
    intent: "Make primary entrypoints executable and deterministic."
    tasks:
      - CT-001
      - CT-002
      - CT-003
      - CT-004
      - CT-005
      - CT-006
      - CT-007
      - CT-008
  - phase: "P1-contract-alignment"
    intent: "Resolve architecture drift, duplicate paths, and contract mismatches."
    tasks:
      - CT-009
      - CT-010
      - CT-011
      - CT-012
      - CT-013
      - CT-014
      - CT-015
      - CT-016
  - phase: "P2-test-and-doc-hardening"
    intent: "Close coverage and documentation gaps on stabilized code."
    tasks:
      - CT-017
      - CT-018
      - CT-019
      - CT-020
      - CT-021
      - CT-022
      - CT-023
      - CT-024

gap_hunt_whole_project:
  missing_docs:
    - id: CT-017
      priority: P1
      title: "Add standardized module headers for primary CLI and service boundary files"
      evidence: "147 parseable src files missing module docstrings; major __init__.py files are comment-only."
      acceptance_criteria:
        - "All files listed in DOCS_PATCH_PLAN.yaml WS-02 and WS-03 have normalized headers."
        - "Headers include: purpose/why/io/side effects/state/invariants."

    - id: CT-018
      priority: P1
      title: "Publish command reference docs for all primary CLI entrypoints"
      evidence: "No single docs location currently covers args/examples/output_schema/exit_codes for all CLIs."
      acceptance_criteria:
        - "Files under docs/cli/ from WS-01 exist and are linked from a central index."
        - "Each command includes explicit exit-code table."

  missing_tests:
    - id: CT-019
      priority: P1
      title: "Add parser and smoke tests for currently untested CLIs"
      evidence: "No direct CLI tests found for status_cli, safety_cli, workflows_cli, vision_cli, overnight_cli, tsla_report_cli, oss_cli, analytics_readiness_cli, system_discovery_agent."
      acceptance_criteria:
        - "At least 1 smoke test per CLI entrypoint with exit-code assertions."
        - "Help path and one real dispatch path tested for each."

    - id: CT-020
      priority: P1
      title: "Reconcile messaging tests with current implementations"
      evidence: "Messaging test suites expect rich APIs while implementations are minimal shims."
      acceptance_criteria:
        - "Either implementation expanded to match tests, or tests rewritten to match documented contract."
        - "No skipped tests due to missing API members."

    - id: CT-021
      priority: P2
      title: "Add concurrency tests for swarm_brain file writes"
      evidence: "Knowledge base write path uses direct file writes without locking."
      acceptance_criteria:
        - "Concurrent add-entry test verifies no JSON corruption or lost updates."

  inconsistent_contracts:
    - id: CT-001
      priority: P0
      title: "Fix main command routing parity with argument parser"
      evidence: "`main.py --status` currently outputs unknown command and exits 1."
      acceptance_criteria:
        - "`--status`, `--stop`, `--kill`, `--validate`, `--cleanup-logs` route to handlers with deterministic exits."

    - id: CT-002
      priority: P0
      title: "Repair broken start handler control flow"
      evidence: "Runtime failure: `name 'result' is not defined` in src/cli/commands/start_handler.py."
      acceptance_criteria:
        - "No undefined variables in startup path."
        - "Startup failures return non-zero process exit code."

    - id: CT-009
      priority: P1
      title: "Resolve unified CLI messaging route to actual module path"
      evidence: "src.cli tries importing src.services.messaging_cli (missing)."
      acceptance_criteria:
        - "`python -m src.cli services messaging --help` succeeds and routes to real implementation."

    - id: CT-010
      priority: P1
      title: "Align deprecated wrappers with actual unified CLI export"
      evidence: "src.core.cli and src.services.cli import `main` from src.cli package, causing fallback failure."
      acceptance_criteria:
        - "Deprecated wrappers call a valid target and preserve args."

    - id: CT-011
      priority: P1
      title: "Reconcile pyproject dependencies with runtime requirements"
      evidence: "`pyproject.toml` project.dependencies is empty while data/requirements.txt declares required runtime packages."
      acceptance_criteria:
        - "Single authoritative dependency declaration chosen and documented."
        - "Install path reproduces CLI smoke matrix without missing module errors."

  orphan_files:
    - id: CT-012
      priority: P1
      title: "Decide fate of command_router path currently unreferenced"
      evidence: "No references found to CommandRouter/create_command_router."
      acceptance_criteria:
        - "Either router is wired into main flow or archived/deleted with migration note."

    - id: CT-013
      priority: P1
      title: "Resolve project path drift between requested roots and actual layout"
      evidence: "Root paths dream_os/project_scanner/agents/runtime/db do not exist."
      acceptance_criteria:
        - "Mapping doc added: requested path -> actual module path."
        - "No tooling assumes non-existent roots."

  duplicated_logic:
    - id: CT-003
      priority: P0
      title: "Fix/merge duplicated CLI handler trees"
      evidence: "Both src/cli/commands/*_handler.py and src/cli/commands/handlers/*_handler.py exist."
      acceptance_criteria:
        - "One canonical handler tree remains."
        - "main.py and any router import only canonical handlers."

    - id: CT-014
      priority: P1
      title: "Consolidate duplicate BaseService implementations"
      evidence: "Three BaseService definitions in src/core/service_base.py, src/core/base/service_base.py, src/core/base/base_service.py."
      acceptance_criteria:
        - "One SSOT base-service contract documented."
        - "Legacy wrappers either removed or formally delegated."

    - id: CT-015
      priority: P1
      title: "Remove duplicate method definitions in project scanner integration"
      evidence: "src/core/project_scanner_integration.py defines _get_thea_guidance and _build_thea_prompt twice."
      acceptance_criteria:
        - "Single implementation per method."
        - "Behavior documented and unit tested."

  leaky_state/memory:
    - id: CT-022
      priority: P2
      title: "Add lock/atomic-write strategy for JSON state files"
      evidence: "Knowledge and status persistence use plain write_text/json dump patterns."
      acceptance_criteria:
        - "Writes are atomic; partial writes cannot corrupt canonical JSON files."

    - id: CT-023
      priority: P2
      title: "Define retention policy and cleanup jobs for logs/cache artifacts"
      evidence: "Multiple features write to logs, project_scans, devlogs, and caches without unified retention contract."
      acceptance_criteria:
        - "Retention windows documented and enforced by scheduled cleanup routine."

  unsafe_defaults:
    - id: CT-004
      priority: P0
      title: "Repair syntax and merge-conflict blockers across src"
      evidence: "Full py_compile pass reports 21 compile errors including conflict marker in robinhood_adapter.py."
      acceptance_criteria:
        - "`python3 -m py_compile` succeeds for all src Python files."

    - id: CT-005
      priority: P0
      title: "Eliminate package-level eager imports that trigger unrelated failures"
      evidence: "Auto-generated __init__.py files import heavy modules; dotenv failure in core blocks many unrelated CLIs."
      acceptance_criteria:
        - "Package __init__.py files avoid importing heavy runtime dependencies."
        - "CLI help paths can run without loading unrelated subsystems."

    - id: CT-006
      priority: P0
      title: "Restore TSLA publisher contract"
      evidence: "tsla_report_cli imports publisher.discord module that does not exist."
      acceptance_criteria:
        - "Publisher module exists or import path updated to existing implementation."
        - "morning_report command runs in dry-run mode."

    - id: CT-007
      priority: P0
      title: "Repair packaged agent_cellphone CLI syntax corruption"
      evidence: "src/agent_cellphone/cli.py has merged print statements and trailing editor artifacts."
      acceptance_criteria:
        - "File compiles and --help returns 0."
        - "All declared subcommands execute parser path."

    - id: CT-008
      priority: P0
      title: "Repair analytics/system discovery CLI syntax blockers"
      evidence: "analytics_readiness_cli has unclosed parenthesis; system_discovery_agent has trailing artifact tags."
      acceptance_criteria:
        - "Both files compile and help commands return 0."

  unclear ownership/modules:
    - id: CT-016
      priority: P1
      title: "Publish module ownership map by domain"
      evidence: "Overlapping implementations and duplicate modules obscure ownership and SSOT."
      acceptance_criteria:
        - "Ownership matrix committed (module -> owning domain/agent/team)."
        - "SSOT module per capability is explicit."

    - id: CT-024
      priority: P2
      title: "Create closure dashboard for blocker burn-down"
      evidence: "Closure work spans compile blockers, contract drift, docs, and tests without single progress tracker."
      acceptance_criteria:
        - "Dashboard tracks CT task state, blocker count, and closure readiness signal."
