task_id: day1-patch-gate
description: 'Day-1 merge gate: diff limits + tests + required output'
diff:
  range: HEAD~1..HEAD
  max_files: 40
  max_added_lines: 1200
  max_deleted_lines: 8000
  allowlist:
  - .github/workflows/**
  - Makefile
  - src/**
  - tests/**
  - tools/merge_gate/**
  - docs/**
  - '*.md'
  - '*.yaml'
  - examples/consensus_demo.py
  - main.py
  - reports/debt_baseline.json
  - scripts/ci_check_deprecated_files.py
  - scripts/ci_duplication_gate.py
  - scripts/ssot_linter.py
  # Dynamic swarm tooling: allow Python scripts under scripts/ and knowledge graph artifacts.
  - scripts/*.py
  - knowledge_graph/*.md
  - knowledge_graph/*.json
  - tools/audit_harness.py
  - tools/audit_harness_duplication.py
  - tools/debt_scan.py
  - tools/security_health_check.py
  - tools/utilities/devlog_poster.py
  - tools/utilities/start_message_queue.py
  - tools/utilities/start_twitch.py
  - data/requirements.txt
  - requirements.txt
  - config/file_header_protocol_v1.3.0.yaml
  - config/file_header_exceptions.yaml
  - tools/file_header_validator.py
  - reports/compliance/**
checks:
  run_tests: true
  test_command: python3 -m pytest -q tests/test_basic.py
  run_lint: false
  run_formatter: false
contracts:
  required_outputs: []
  require_non_empty: true
  allow_new_files: false
  new_file_allowlist:
  - scripts/ci_check_deprecated_files.py
  - scripts/ci_duplication_gate.py
  - scripts/ssot_linter.py
  # Dynamic swarm tooling: allow Python scripts under scripts/ and knowledge graph artifacts.
  - scripts/*.py
  - knowledge_graph/*.md
  - knowledge_graph/*.json
  - knowledge_graph/diff_summary.md
  - src/core/config_ssot.py
  - src/core/pydantic_config.py
  - src/core/unified_config.py
  - .github/workflows/file-header-compliance.yml
  - config/file_header_protocol_v1.3.0.yaml
  - config/file_header_exceptions.yaml
  - tools/file_header_validator.py
  - tests/test_file_header_validator.py
  - tests/fixtures/file_header_protocol/comment_mismatch/sample.ts
  - tests/fixtures/file_header_protocol/exceptions/expired.py
  - tests/fixtures/file_header_protocol/invalid_placeholder/sample.py
  - tests/fixtures/file_header_protocol/invalid_preheader/sample.js
  - tests/fixtures/file_header_protocol/missing/sample.py
  - tests/fixtures/file_header_protocol/partial/sample.py
  - tests/fixtures/file_header_protocol/rename/new_name.py
  - tests/fixtures/file_header_protocol/valid_full/sample.js
  - tests/fixtures/file_header_protocol/valid_full/sample.py
  - tests/fixtures/file_header_protocol/valid_utility/sample.py
  - reports/compliance/file_header_baseline_v1.3.0.json
  - reports/compliance/file_header_report.json
  - reports/compliance/file_header_report.md
