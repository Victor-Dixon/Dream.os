task_id: day1-patch-gate
description: 'Day-1 merge gate: profile-ready diff limits + tests + required output'

# SSOT path classes for dynamic swarm workflows.
path_classes:
  core_source: &core_source src/**
  tests: &tests tests/**
  docs_tree: &docs_tree docs/**
  workflows: &workflows .github/workflows/**
  tooling_scripts: &tooling_scripts scripts/*.py
  tooling_tree: &tooling_tree tools/**
  generated_knowledge_graph_md: &generated_kg_md knowledge_graph/*.md
  generated_knowledge_graph_json: &generated_kg_json knowledge_graph/*.json
  generated_reports: &generated_reports reports/**
  config_yamls: &config_yamls config/**/*.yaml

# Profile catalog for operator intent. Merge Gate v1 enforces the union baseline below,
# while these profiles define SSOT policy lanes for swarm routing and future v2 logic.
profiles:
  runtime:
    allow_paths:
      - *core_source
      - main.py
      - Makefile
      - data/requirements.txt
      - requirements.txt
  tooling:
    allow_paths:
      - *tooling_scripts
      - *tooling_tree
      - examples/consensus_demo.py
  docs:
    allow_paths:
      - *docs_tree
      - '*.md'
      - '*.yaml'
  generated-artifacts:
    allow_paths:
      - *generated_kg_md
      - *generated_kg_json
      - *generated_reports
  infra:
    allow_paths:
      - *workflows
      - *config_yamls
  emergency-fix:
    allow_paths:
      - *core_source
      - *tests
      - *workflows

# Day-1 baseline = safe union of approved lanes.
diff:
  range: HEAD~1..HEAD
  max_files: 40
  max_added_lines: 1200
  max_deleted_lines: 8000
  allowlist:
  - *workflows
  - Makefile
  - *core_source
  - *tests
  - *tooling_tree
  - *docs_tree
  - '*.md'
  - '*.yaml'
  - examples/consensus_demo.py
  - main.py
  - *generated_reports
  - *tooling_scripts
  - *generated_kg_md
  - *generated_kg_json
  - data/requirements.txt
  - requirements.txt
  - config/file_header_protocol_v1.3.0.yaml
  - config/file_header_exceptions.yaml
checks:
  run_tests: true
  test_command: python3 -m pytest -q tests/test_basic.py
  run_lint: false
  run_formatter: false
contracts:
  required_outputs: []
  require_non_empty: true
  allow_new_files: false
  # Adaptive new-file policy by class: source/config/docs/tooling/generated artifacts.
  # Runtime state and secrets remain blocked by omission (e.g. pids/**, alerts/**, .env*).
  new_file_allowlist:
  - *tooling_scripts
  - *generated_kg_md
  - *generated_kg_json
  - *generated_reports
  - *core_source
  - *tests
  - *docs_tree
  - *workflows
  - config/**/*.yaml
  - config/**/*.yml
  - '*.md'
  - '*.yaml'
  - '*.yml'
  - data/requirements.txt
  - requirements.txt
