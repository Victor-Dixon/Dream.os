name: Snapshot Review Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "tests/snapshots/**"
      - "scripts/build_knowledge_graph.py"
      - "scripts/snapshot_diff_summary.py"
      - "docs/recovery/recovery_registry.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  snapshot-diff-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Build head graph
        run: |
          python scripts/build_knowledge_graph.py \
            --snapshots-dir tests/snapshots \
            --registry docs/recovery/recovery_registry.yaml \
            --repo-root . \
            --output /tmp/head_graph.json \
            --include-import-edges

      - name: Build base graph
        run: |
          set -euo pipefail

          mkdir -p /tmp/base/tests/snapshots /tmp/base/docs/recovery

          if git cat-file -e "${{ github.event.pull_request.base.sha }}:docs/recovery/recovery_registry.yaml" 2>/dev/null; then
            git show "${{ github.event.pull_request.base.sha }}:docs/recovery/recovery_registry.yaml" > /tmp/base/docs/recovery/recovery_registry.yaml
          else
            printf "files: []\n" > /tmp/base/docs/recovery/recovery_registry.yaml
          fi

          git ls-tree -r --name-only "${{ github.event.pull_request.base.sha }}" tests/snapshots \
            | grep -E 'batch_.*_(module_contracts|registry_coverage)\.json$' \
            | while read -r path; do
                mkdir -p "/tmp/base/$(dirname "$path")"
                git show "${{ github.event.pull_request.base.sha }}:${path}" > "/tmp/base/${path}"
              done || true

          python scripts/build_knowledge_graph.py \
            --snapshots-dir /tmp/base/tests/snapshots \
            --registry /tmp/base/docs/recovery/recovery_registry.yaml \
            --repo-root /tmp/base \
            --output /tmp/base_graph.json \
            --include-import-edges

      - name: Generate summary
        run: |
          if python scripts/snapshot_diff_summary.py \
            --old /tmp/base_graph.json \
            --new /tmp/head_graph.json \
            > /tmp/snapshot_summary.md; then
            true
          else
            {
              echo "<!-- snapshot-review-summary -->"
              echo "## Snapshot Diff Summary"
              echo
              echo "Unable to generate summary automatically."
            } > /tmp/snapshot_summary.md
          fi

          if ! grep -q "<!-- snapshot-review-summary -->" /tmp/snapshot_summary.md; then
            tmpfile="$(mktemp)"
            {
              echo "<!-- snapshot-review-summary -->"
              cat /tmp/snapshot_summary.md
            } > "$tmpfile"
            mv "$tmpfile" /tmp/snapshot_summary.md
          fi

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/snapshot_summary.md
          edit-mode: replace
          comment-tag: snapshot-review-summary

      - name: Enforce expected path scope (optional)
        run: |
          python scripts/snapshot_diff_summary.py \
            --old /tmp/base_graph.json \
            --new /tmp/head_graph.json \
            --expected-prefix src/core/ \
            --fail-on-unexpected