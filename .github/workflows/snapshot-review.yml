name: Snapshot Review Summary

on:
  pull_request:
    paths:
      - "tests/snapshots/*.json"
      - "scripts/build_knowledge_graph.py"
      - "scripts/snapshot_diff_summary.py"

jobs:
  snapshot-summary:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build head graph
        run: python scripts/build_knowledge_graph.py --repo-root . --output knowledge_graph/head.json --include-imports

      - name: Build base graph
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          mkdir -p /tmp/base_repo/tests/snapshots /tmp/base_repo/docs/recovery
          git ls-tree -r --name-only "$BASE_SHA" tests/snapshots \
            | grep -E 'batch_.*_(module_contracts|registry_coverage)\.json$' \
            | while read -r f; do
                mkdir -p "/tmp/base_repo/$(dirname "$f")"
                git show "$BASE_SHA:$f" > "/tmp/base_repo/$f"
              done || true
          git show "$BASE_SHA:docs/recovery/recovery_registry.yaml" > /tmp/base_repo/docs/recovery/recovery_registry.yaml || true
          python scripts/build_knowledge_graph.py --repo-root /tmp/base_repo --output knowledge_graph/base.json

      - name: Generate markdown summary
        run: |
          python scripts/snapshot_diff_summary.py \
            --old-graph knowledge_graph/base.json \
            --new-graph knowledge_graph/head.json \
            --output knowledge_graph/diff_summary.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('knowledge_graph/diff_summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
